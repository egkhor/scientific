<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGK High Speed Rail</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');

:root {
–sky-top: #0a0e1a;
–sky-mid: #1a2a4a;
–sky-low: #2a4a7a;
–horizon: #4a7aaa;
–ground: #1a1a2a;
–rail-silver: #8899aa;
–egk-blue: #0055cc;
–egk-orange: #ff6600;
–egk-white: #f0f4ff;
–glass-tint: rgba(180,220,255,0.15);
–speed-glow: rgba(0,120,255,0.6);
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–sky-top);
overflow: hidden;
font-family: ‘Rajdhani’, sans-serif;
height: 100vh;
width: 100vw;
position: relative;
}

/* ── SKY GRADIENT ── */
.sky {
position: absolute;
inset: 0;
background: linear-gradient(
180deg,
#040810 0%,
#0a1828 25%,
#102040 50%,
#1a3860 65%,
#2a5080 75%,
#3a6898 82%,
#5888b8 90%,
#7aaar0 95%
);
background: linear-gradient(
180deg,
#040810 0%,
#0a1828 20%,
#112244 45%,
#1e4070 62%,
#2e5888 72%,
#4878a8 82%,
#6898c8 90%,
#88b8d8 96%,
#aad0e8 100%
);
}

/* ── STARS ── */
.stars {
position: absolute;
top: 0; left: 0;
width: 100%; height: 60%;
overflow: hidden;
}

.star {
position: absolute;
background: white;
border-radius: 50%;
animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
0% { opacity: 0.2; transform: scale(1); }
100% { opacity: 1; transform: scale(1.3); }
}

/* ── MOUNTAINS ── */
.mountains-far {
position: absolute;
bottom: 30%;
width: 100%;
height: 22%;
overflow: hidden;
}

.mountains-far svg {
position: absolute;
bottom: 0;
width: 100%;
height: 100%;
}

.mountains-mid {
position: absolute;
bottom: 28%;
width: 200%;
height: 18%;
animation: slideMtnMid 30s linear infinite;
}

.mountains-mid svg {
position: absolute;
bottom: 0;
width: 50%;
height: 100%;
}
.mountains-mid svg:nth-child(2) { left: 50%; }

@keyframes slideMtnMid {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}

/* ── GROUND ── */
.ground {
position: absolute;
bottom: 0;
width: 100%;
height: 30%;
background: linear-gradient(
180deg,
#1e2838 0%,
#151d28 30%,
#0e1520 100%
);
border-top: 2px solid rgba(100,140,180,0.3);
}

/* ── HORIZON GLOW ── */
.horizon-glow {
position: absolute;
bottom: 29%;
width: 100%;
height: 8%;
background: linear-gradient(
180deg,
transparent 0%,
rgba(80,140,200,0.15) 40%,
rgba(100,160,220,0.35) 70%,
rgba(120,180,240,0.5) 100%
);
}

/* ── RAIL TRACKS ── */
.tracks {
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 30%;
perspective: 600px;
perspective-origin: 50% 0%;
}

.track-svg {
position: absolute;
bottom: 0;
width: 100%;
height: 100%;
}

/* ── SPEED LINES (background) ── */
.speed-lines {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
overflow: hidden;
pointer-events: none;
}

.speed-line {
position: absolute;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(100,160,255,0.4), transparent);
animation: speedLine 0.6s linear infinite;
transform-origin: right center;
}

@keyframes speedLine {
0% { transform: scaleX(0); opacity: 0; right: 0; }
20% { opacity: 1; }
80% { opacity: 0.6; }
100% { transform: scaleX(1); opacity: 0; right: 100%; }
}

/* ── TRAIN WRAPPER ── */
.train-scene {
position: absolute;
bottom: 22%;
left: 0;
width: 100%;
height: 38%;
overflow: visible;
}

/* ── TRAIN CONTAINER ── */
.train {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
display: flex;
align-items: flex-end;
filter: drop-shadow(0 0 30px rgba(0,80,200,0.8)) drop-shadow(0 0 60px rgba(0,60,160,0.4));
animation: trainFloat 4s ease-in-out infinite;
}

@keyframes trainFloat {
0%, 100% { transform: translateX(-50%) translateY(0px); }
50% { transform: translateX(-50%) translateY(-3px); }
}

/* ── LOCOMOTIVE (EUROSTAR STYLE) ── */
.loco {
position: relative;
width: 260px;
height: 110px;
flex-shrink: 0;
}

.loco svg {
width: 100%;
height: 100%;
overflow: visible;
}

/* ── CARGO CARS ── */
.car {
position: relative;
height: 90px;
flex-shrink: 0;
margin-left: -2px;
}

.car svg {
height: 100%;
overflow: visible;
}

/* ── PASSENGER CARS ── */
.pax {
position: relative;
height: 88px;
flex-shrink: 0;
margin-left: -2px;
}

.pax svg {
height: 100%;
overflow: visible;
}

/* ── TAIL ── */
.tail {
position: relative;
width: 140px;
height: 100px;
flex-shrink: 0;
margin-left: -2px;
}

.tail svg {
width: 100%;
height: 100%;
overflow: visible;
}

/* ── WHEEL ANIMATION ── */
.wheel-spin {
animation: spin 0.3s linear infinite;
transform-origin: center;
}

@keyframes spin {
100% { transform: rotate(360deg); }
}

/* ── PANTOGRAPH SPARK ── */
.spark {
position: absolute;
top: 8px;
right: 80px;
width: 20px;
height: 20px;
animation: spark 0.15s linear infinite alternate;
}

@keyframes spark {
0% { opacity: 1; transform: scale(1) rotate(0deg); }
100% { opacity: 0.4; transform: scale(1.5) rotate(45deg); }
}

/* ── MOTION BLUR STREAKS on train ── */
.motion-blur {
position: absolute;
right: 100%;
bottom: 15px;
height: 60px;
width: 300px;
background: linear-gradient(90deg, transparent 0%, rgba(0,80,200,0.12) 50%, rgba(0,80,200,0.3) 100%);
clip-path: polygon(0 20%, 100% 0%, 100% 100%, 0 80%);
animation: blurPulse 0.5s ease-in-out infinite alternate;
}

@keyframes blurPulse {
0% { opacity: 0.6; width: 280px; }
100% { opacity: 1; width: 340px; }
}

/* ── GROUND SPEED DUST ── */
.ground-dust {
position: absolute;
bottom: -5px;
right: 90%;
width: 400px;
height: 20px;
background: linear-gradient(90deg, transparent, rgba(80,120,180,0.2), rgba(100,150,200,0.4));
border-radius: 50%;
filter: blur(6px);
animation: dustPulse 0.4s ease-in-out infinite alternate;
}

@keyframes dustPulse {
0% { width: 350px; opacity: 0.5; }
100% { width: 450px; opacity: 0.9; }
}

/* ── CATENARY WIRE ── */
.catenary {
position: absolute;
top: 5%;
left: 0;
width: 200%;
height: 8%;
animation: slideWire 2s linear infinite;
}

@keyframes slideWire {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}

/* ── SCENERY POLES ── */
.poles {
position: absolute;
bottom: 0;
left: 0;
width: 200%;
height: 100%;
animation: slidePoles 4s linear infinite;
pointer-events: none;
}

@keyframes slidePoles {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}

/* ── HUD OVERLAY ── */
.hud {
position: absolute;
top: 20px;
left: 0;
width: 100%;
display: flex;
justify-content: space-between;
padding: 0 30px;
pointer-events: none;
z-index: 10;
}

.hud-panel {
background: rgba(0,10,30,0.75);
border: 1px solid rgba(0,100,200,0.4);
border-radius: 6px;
padding: 12px 18px;
backdrop-filter: blur(8px);
box-shadow: 0 0 20px rgba(0,80,200,0.2), inset 0 0 10px rgba(0,60,160,0.1);
}

.hud-label {
font-family: ‘Rajdhani’, sans-serif;
font-size: 10px;
letter-spacing: 3px;
color: rgba(100,160,220,0.7);
text-transform: uppercase;
margin-bottom: 3px;
}

.hud-value {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 32px;
color: #88ccff;
letter-spacing: 2px;
line-height: 1;
text-shadow: 0 0 10px rgba(0,140,255,0.8);
}

.hud-unit {
font-size: 13px;
color: rgba(100,160,220,0.8);
letter-spacing: 1px;
}

.speed-ticker {
animation: speedTick 2s steps(1) infinite;
}

@keyframes speedTick {
0% { content: “”; }
0% { opacity: 1; }
50% { opacity: 0.85; }
}

.hud-center {
text-align: center;
}

.route-text {
font-family: ‘Rajdhani’, sans-serif;
font-size: 11px;
letter-spacing: 4px;
color: rgba(150,200,255,0.9);
text-transform: uppercase;
}

.route-line {
display: flex;
align-items: center;
gap: 10px;
margin-top: 5px;
justify-content: center;
}

.route-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: #88ccff;
box-shadow: 0 0 8px #88ccff;
animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.6; }
}

.route-dash {
flex: 1;
height: 1px;
background: linear-gradient(90deg, rgba(100,160,220,0.3), rgba(100,160,220,0.8), rgba(100,160,220,0.3));
max-width: 80px;
}

/* ── BOTTOM STATUS BAR ── */
.status-bar {
position: absolute;
bottom: 15px;
left: 50%;
transform: translateX(-50%);
background: rgba(0,10,30,0.8);
border: 1px solid rgba(0,100,200,0.35);
border-radius: 30px;
padding: 8px 24px;
display: flex;
gap: 30px;
align-items: center;
backdrop-filter: blur(8px);
z-index: 10;
}

.status-item {
display: flex;
align-items: center;
gap: 8px;
}

.status-dot {
width: 7px; height: 7px;
border-radius: 50%;
animation: pulse 1s ease-in-out infinite;
}

.status-dot.green { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
.status-dot.blue  { background: #0099ff; box-shadow: 0 0 8px #0099ff; }
.status-dot.orange{ background: #ff8800; box-shadow: 0 0 8px #ff8800; }

.status-text {
font-family: ‘Rajdhani’, sans-serif;
font-size: 11px;
letter-spacing: 2px;
color: rgba(160,200,240,0.85);
text-transform: uppercase;
}

/* ── SCANLINE EFFECT ── */
.scanlines {
position: fixed;
inset: 0;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0,0,0,0.03) 2px,
rgba(0,0,0,0.03) 4px
);
pointer-events: none;
z-index: 20;
}

/* ── VIGNETTE ── */
.vignette {
position: fixed;
inset: 0;
background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,10,0.7) 100%);
pointer-events: none;
z-index: 15;
}

/* ── EGK LOGO on train ── */
.egk-logo-img {
image-rendering: crisp-edges;
}
</style>

</head>

<script>
// ── Generate stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.2 + 0.4;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    animation-delay:${Math.random()*4}s;
    animation-duration:${2+Math.random()*3}s;
  `;
  starsEl.appendChild(s);
}

// ── Generate speed lines ──
const linesEl = document.getElementById('speedLines');
for (let i = 0; i < 25; i++) {
  const l = document.createElement('div');
  l.className = 'speed-line';
  const width = 80 + Math.random() * 200;
  const top   = 15 + Math.random() * 65;
  l.style.cssText = `
    width:${width}px;
    top:${top}%;
    right:${Math.random()*30}%;
    animation-delay:${Math.random()*0.6}s;
    animation-duration:${0.4 + Math.random()*0.4}s;
    opacity:${0.3 + Math.random()*0.5};
  `;
  linesEl.appendChild(l);
}

// ── Wheel spin: individual origins ──
document.querySelectorAll('.wheel-spin').forEach(el => {
  const cx = el.getAttribute('cx');
  const cy = el.getAttribute('cy');
  const x1 = el.getAttribute('x1');
  const y1 = el.getAttribute('y1');
  if (cx && cy) {
    el.style.transformOrigin = `${cx}px ${cy}px`;
    el.style.animation = `spin ${0.2 + Math.random()*0.15}s linear infinite`;
  }
});

// ── Animated speed/power HUD ──
let baseSpeed = 320;
let speedDir  = 1;
setInterval(() => {
  baseSpeed += speedDir * (Math.random() * 2);
  if (baseSpeed > 325) speedDir = -1;
  if (baseSpeed < 315) speedDir =  1;
  document.getElementById('speedVal').textContent = Math.round(baseSpeed);
  document.getElementById('powerVal').textContent = (11.8 + Math.random()*0.8).toFixed(1);
}, 300);
</script>
